grafana:
  enabled: true
  admin:
    existingSecret: grafana-credentials
    userKey: admin-user
    passwordKey: admin-password
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: "400Mi"
        cpu: "100m"
      limits:
        memory: "800Mi"
        cpu: "500m"

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true